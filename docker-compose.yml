services:
  postgres:
    image: postgres:16.3
    environment:
      POSTGRES_USER: petclinic
      POSTGRES_PASSWORD: petclinic
      POSTGRES_DB: petclinic
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    image: krusharoska/spring-petclinic-rest:latest
    ports:
      - "9966:9966"
    environment:
      SPRING_PROFILES_ACTIVE: "postgres,spring-data-jpa"
      POSTGRES_URL: "jdbc:postgresql://postgres:5432/petclinic"
      POSTGRES_USER: petclinic
      POSTGRES_PASS: petclinic
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ../spring-petclinic-angular
    image: krusharoska/spring-petclinic-angular:latest
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres-data:
