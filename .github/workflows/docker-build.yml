---
name: Build and Push to Docker Hub

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: ./mvnw package -DskipTests -B -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            krusharoska/spring-petclinic-rest:latest
            krusharoska/spring-petclinic-rest:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Deploy to k3d cluster
        run: |
          kubectl config use-context k3d-petclinic
          kubectl rollout restart deployment/petclinic-backend -n petclinic
          kubectl rollout restart deployment/petclinic-frontend -n petclinic
          kubectl rollout status deployment/petclinic-backend -n petclinic --timeout=120s
          kubectl rollout status deployment/petclinic-frontend -n petclinic --timeout=120s
